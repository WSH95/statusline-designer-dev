<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Status Bar Composer</title>
<link rel="stylesheet" href="/app.css">
<script>
/* apply the saved appearance before first paint to avoid a flash */
(function () {
  var t;
  try { t = localStorage.getItem("sbc-theme"); } catch (e) {}
  if (!t) { try { t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"; } catch (e) { t = "light"; } }
  document.documentElement.dataset.theme = t;
})();
</script>
</head>
<body>

<header class="toolbar">
  <h1 class="app-title">Status Bar Composer</h1>
  <div class="tb-actions">
    <span id="applyStatus" class="apply-status" role="status" aria-live="polite"></span>
    <button id="helpBtn" class="icon-btn" type="button" aria-label="Gestures and shortcuts" aria-haspopup="dialog"></button>
    <button id="exportBtn" class="icon-btn" type="button" aria-label="Export design JSON" title="Export design JSON"></button>
    <div class="menu-anchor">
      <button id="presetsBtn" class="soft-btn" type="button" aria-haspopup="menu" aria-expanded="false">Presets<span class="chev" aria-hidden="true"></span></button>
      <div id="presetsMenu" class="menu" role="menu" hidden></div>
    </div>
    <button id="themeBtn" class="icon-btn" type="button" aria-label="Switch between light and dark appearance"></button>
    <button id="applyBtn" class="primary-btn" type="button">Apply to Terminal</button>
  </div>
</header>

<main class="stage" id="stage">
  <section class="terminal" aria-label="Live preview of your status line">
    <div class="term-chrome">
      <span class="traffic" aria-hidden="true"><i class="tl tl-r"></i><i class="tl tl-y"></i><i class="tl tl-g"></i></span>
      <span class="term-title" id="termTitle">terminal</span>
      <span class="live-dot" title="Preview updates live"></span>
    </div>
    <div class="term-body">
      <div class="term-prompt" id="termPrompt"></div>
      <div class="term-status" id="termStatus"></div>
    </div>
  </section>

  <div class="carousel-band" id="band">
    <div class="floor" aria-hidden="true"></div>
    <div class="scene" id="scene">
      <div class="ring" id="ring"></div>
    </div>
    <button id="prevBtn" class="edge-arrow edge-left" type="button" aria-label="Previous card"></button>
    <button id="nextBtn" class="edge-arrow edge-right" type="button" aria-label="Next card"></button>
  </div>

  <div id="dots" class="dots" role="group" aria-label="Cards"></div>
</main>

<section class="dock" id="dock" aria-label="Field order">
  <div class="dock-row">
    <span class="dock-tag">Line 1</span>
    <div class="dock-lane" id="lane1" data-line="1" aria-label="Line 1 fields"></div>
  </div>
  <div class="dock-row">
    <span class="dock-tag">Line 2</span>
    <div class="dock-lane" id="lane2" data-line="2" aria-label="Line 2 fields"></div>
  </div>
</section>

<div id="popover" class="popover" hidden></div>
<div id="scrim" class="scrim" hidden></div>

<script>window.BOOT = __BOOT__;</script>
<script src="/js/catalog.js"></script>
<script src="/js/preview.js"></script>
<script src="/js/ring.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
